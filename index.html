<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAHOU ARCHIVE</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,600;1,400&family=Inter:wght=300;400;500&family=Vazirmatn:wght=200;300;400;500&display=swap" rel="stylesheet">

  <!-- THE ARCHIVE MODAL STYLE INJECTOR -->
  <style>
    /* Armored Post Card Layout wrapper to ignore internal feed overflows */
    .post-card-container {
      background: rgba(255, 255, 255, 0.95) !important;
      padding: 40px !important;
      margin-bottom: 35px !important;
      border: 3px solid #1a1820 !important;
      position: relative !important;
      box-shadow: 8px 8px 0px #ff2e63 !important;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
      text-align: right !important;
    }
    
    .post-card-container:hover {
      transform: translate(-2px, -2px) !important;
      box-shadow: 12px 12px 0px #00dffc !important;
    }

    .post-card-container h2 {
      font-size: 26px !important;
      margin-bottom: 14px !important;
    }

    .post-card-container h2 span {
      color: #1a1820 !important;
      cursor: pointer !important;
      font-weight: 600 !important;
    }

    .post-card-container:hover h2 span {
      color: #ff2e63 !important;
    }

    /* Embedded Reader Overlay Window */
    .mahou-reader-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(26, 24, 32, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .mahou-reader-content {
      background: #ffffff;
      border: 3px solid #1a1820;
      box-shadow: 12px 12px 0px #ff2e63;
      width: 100%;
      max-width: 820px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      direction: rtl;
      text-align: right;
    }

    .mahou-reader-close {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #1a1820;
      color: #ffffff;
      border: none;
      width: 35px;
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 3px 3px 0px #00dffc;
    }

    .mahou-reader-close:hover {
      background: #ff2e63;
      box-shadow: 3px 3px 0px #1a1820;
    }

    /* Sanitized visual wrappers inside the reading portal */
    .mahou-reader-html img {
      max-width: 100% !important;
      height: auto !important;
      border: 2px solid #1a1820 !important;
      margin: 15px auto !important;
      display: block;
    }
  </style>
</head>
<body>

<div id="back-to-top" title="Reload Position"><i class="fas fa-crosshairs"></i></div>

<!-- THE INTERNAL ARCHIVE VIEW PANEL -->
<div id="mahou-reader" class="mahou-reader-modal" onclick="closeInternalReader()">
  <div class="mahou-reader-content" onclick="event.stopPropagation()">
    <button class="mahou-reader-close" onclick="closeInternalReader()"><i class="fas fa-times"></i></button>
    <h1 id="reader-title" style="font-size: 28px; margin-bottom: 15px; color: #1a1820;"></h1>
    <div class="post-meta" id="reader-meta" style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #1a1820;"></div>
    <div id="reader-body" class="mahou-reader-html" style="line-height: 1.9; font-size: 15px; text-align: justify; color: #222;"></div>
  </div>
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <a href="#" class="logo">MAHOU ARCHIVE: ارشیو مدیا </a>
    <div><i class="fas fa-bullseye"></i></div>
  </div>

  <!-- NATIVE GRID LAYOUT ENGINE -->
  <div class="main">

    <!-- POSTS COMPONENT COLUMN -->
    <div id="blogfa-mirror-posts">
      <div class="post-card-container">
        <p style="text-align: center; color: #5a5666;">در حال بارگذاری نوشته‌های وبلاگ...</p>
      </div>
    </div>

    <!-- SIDEBAR COMPONENT COLUMN -->
    <div class="sidebar">
      
      <!-- Profile Box -->
      <div class="panel">
        <b><i class="fas fa-user-circle"></i>About Me!</b>
        <div class="webmaster-profile">
          <div class="webmaster-avatar">
            <img src="https://uploadkon.ir/uploads/06a730_26InShot-20260530-094627246.gif" alt="Operator Edgar">
          </div>
          <div class="webmaster-info">
            <h3>ALLSSEY (He/Him)</h3>
            <span class="role">Sleepy</span>
          </div>
        </div>
        <div class="webmaster-bio">
          <span style="display: block; color: #ff2e63; font-weight: bold; font-family:'Inter'; font-size:11px;"> STATUS: aint nothing but a heartache</span>
        </div>
      </div>

      <!-- Playlist Box -->
      <div class="panel">
        <b><i class="fas fa-music"></i> 🎧 Playlists </b>
        <div id="playlist-container"></div>
        <audio id="player" controls preload="none"></audio>
      </div>

      <!-- Graphics Info Box -->
      <div class="panel">
        <b><i class="fas fa-shield-alt"></i> About </b>
        <img class="about-img" src="https://uploadkon.ir/uploads/c9b229_26cff7ba6be9f4ab104271ca89e4451844.jpg" alt="Surveillance Layer Image">
        <div class="webmaster-bio" style="font-size:0.82rem; color:#5a5666;">
          WIP <span style="display: block; margin-top: 6px; color: #ff2e63; font-family:'Inter'; font-weight: bold;">TIMESTAMP: 9th Kho/405 🎯</span>
          <img src="https://uploadkon.ir/uploads/45d730_26IMG-7133.gif" style="display: block; margin-top: 10px; width:100%; border: 2px solid #1a1820;">
        </div>
      </div>

    </div> <!-- End Sidebar -->

  </div> <!-- End Main -->
</div> <!-- End Container -->

<!-- AUDIO ARCHIVE SYSTEM LAYER -->
<script>
const playlists = [
  {
    folderName: "Madoka Magica OST",
    songs: [
      {
        name: "sis puella magica!",
        url: "https://uploadkon.ir/uploads/1fd629_2614-Sis-Puella-Magica-Yuki-Kajiura-320-.mp3",
        cover: "https://uploadkon.ir/uploads/fa3e29_26IMG-20260529-231618.jpg"
      },
      {
        name: "Dectrum",
        url: "https://uploadkon.ir/uploads/312d29_2612-Decretum-Sayaka-Miki-s-Them-Madoka-Magica【まどکま★マギカ】-PianoBox.mp3",
        cover: "https://uploadkon.ir/uploads/b4f529_26IMG-20260529-231602.jpg"
      },
      {
        name: "Magia Quattro",
        url: "https://uploadkon.ir/uploads/b38330_26Kalafina-Magia-quattro-128.mp3",
        cover: "https://uploadkon.ir/uploads/ea1130_26artworks-000034010291-41yfh5-t500x500.jpg"
      }
    ]
  }, 
  {
    folderName: "All Ado",
    songs: [
      {
        name: "Kura Kura",
        url: "https://uploadkon.ir/uploads/fb4630_26Ado-クラクラ-128.mp3",
        cover: "https://uploadkon.ir/uploads/203530_26IMG-20260530-165511.jpg"
       },
      { 
        name: "Ashite Ashite",
        url: "https://uploadkon.ir/uploads/eb8c24_26Ado-Aishite-Aishite-Aishite-000035.mp3",
        cover: "https://uploadkon.ir/uploads/6b9724_261ca44dc5eac6d36f42e0e05fd4fa1b63.jpg"
       },
      { 
        name:  "Readymade",
        url: "https://uploadkon.ir/uploads/926d24_26Ado-Readymade-000012.mp3",
        cover: "https://uploadkon.ir/uploads/ff9f24_2628a32cbc5884bbb69739f1f073c541bb-1000x1000x1.png"
       }
    ]
  }
];

let currentFolderIdx = null;
let currentSongIdx = null;

const playlistContainer = document.getElementById('playlist-container');
if (playlistContainer && playlists && playlists.length > 0) {
  playlists.forEach((folder, fIdx) => {
    const fDiv = document.createElement('div');
    fDiv.className = 'playlist-folder';
    fDiv.innerHTML = `
      <div class="folder-header" onclick="toggleFolder(${fIdx})">
        <div class="folder-title"><i class="fas fa-folder"></i> <span>${folder.folderName}</span></div>
        <div class="folder-chevron"><i class="fas fa-chevron-down"></i></div>
      </div>
      <div class="folder-songs" id="folder-${fIdx}"><div class="folder-songs-inner"></div></div>
    `;
    const inner = fDiv.querySelector('.folder-songs-inner');
    folder.songs.forEach((song, sIdx) => {
      const sDiv = document.createElement('div');
      sDiv.className = 'song';
      sDiv.onclick = (e) => { e.stopPropagation(); playTrack(fIdx, sIdx); };
      sDiv.innerHTML = `
        <img src="${song.cover}">
        <span>${song.name}</span>
      `;
      inner.appendChild(sDiv);
    });
    playlistContainer.appendChild(fDiv);
  });
}

function toggleFolder(idx) {
  const targetFolder = document.querySelectorAll('.playlist-folder')[idx];
  if (targetFolder) {
    targetFolder.classList.toggle('is-open');
  }
}

function playTrack(fIdx, sIdx) {
  const player = document.getElementById('player');
  if (!player) return;
  currentFolderIdx = fIdx; currentSongIdx = sIdx;
  player.src = playlists[fIdx].songs[sIdx].url;
  player.style.display = 'block';
  player.play().catch(err => console.log("Audio block active:", err));
}
</script>

<!-- DUP FETCH ENGINE WITH ENCAPSULATED RENDER CONTROLS -->
<script>
  const rssFeedUrl = "https://mahouarchive.blogfa.com/rss2"; 
  const apiEndpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssFeedUrl)}&count=20`;

  let loadedFeedItems = [];

  async function loadMirrorPosts() {
    try {
      const response = await fetch(apiEndpoint);
      const data = await response.json();

      if (data.status === 'ok') {
        loadedFeedItems = data.items;
        const container = document.getElementById('blogfa-mirror-posts');
        container.innerHTML = ''; 

        loadedFeedItems.forEach((post, index) => {
          const postElement = document.createElement('div');
          postElement.className = 'post-card-container'; 

          // Build clean standalone structure mapping directly to native style definitions
          postElement.innerHTML = `
            <h2><span onclick="openInternalReader(${index})">★ ${post.title}</span></h2>
            <div class="post-meta">
              <span><i class="fas fa-calendar-alt"></i> ${new Date(post.pubDate).toLocaleDateString('fa-IR')}</span>
            </div>
            <div style="display:flex; justify-content:flex-end; margin-top:25px;">
              <div class="comment-redirect-link" onclick="openInternalReader(${index})" style="cursor:pointer;">
                <i class="far fa-envelope-open"></i> مشاهده نظرات و ادامه مطلب
              </div>
            </div>
          `;
          container.appendChild(postElement);
        });
      } else {
        document.getElementById('blogfa-mirror-posts').innerHTML = '<div class="post-card-container"><p>خطا در دریافت اطلاعات ارشیو.</p></div>';
      }
    } catch (error) {
      console.error(error);
      document.getElementById('blogfa-mirror-posts').innerHTML = '<div class="post-card-container"><p>مشکلی در اتصال به منبع رخ داد.</p></div>';
    }
  }

  // Inject content inside isolated view container on click event
  function openInternalReader(index) {
    const post = loadedFeedItems[index];
    if(!post) return;

    document.getElementById('reader-title').innerText = `★ ${post.title}`;
    document.getElementById('reader-meta').innerHTML = `<span><i class="fas fa-calendar-alt"></i> ${new Date(post.pubDate).toLocaleDateString('fa-IR')}</span>`;
    document.getElementById('reader-body').innerHTML = post.content || post.description;
    
    document.getElementById('mahou-reader').style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
  }

  function closeInternalReader() {
    document.getElementById('mahou-reader').style.display = 'none';
    document.body.style.overflow = '';
  }

  window.addEventListener('DOMContentLoaded', loadMirrorPosts);
</script>
</body>
</html>

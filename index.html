<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAHOU ARCHIVE</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,600;1,400&family=Inter:wght=300;400;500&family=Vazirmatn:wght=200;300;400;500&display=swap" rel="stylesheet">

  <!-- COMPLETE SIDEBAR AND GRID CONTAINER FIX -->
  <style>
    /* Main Layout Grid Fix */
    .mahou-main-grid {
      display: flex !important;
      flex-direction: row !important; /* Force sidebar left, posts right based on your visual alignment preference */
      justify-content: space-between !important;
      align-items: flex-start !important;
      gap: 40px !important;
      max-width: 1250px !important;
      margin: 40px auto !important;
      padding: 0 20px !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }

    /* Left Content Column: Dynamic RSS Blog Posts */
    #blogfa-mirror-posts {
      flex: 1 !important;
      min-width: 0 !important;
      display: block !important;
    }

    /* Isolated Sidebar Panel Structure to completely ignore style.css interference */
    .mahou-sidebar {
      width: 320px !important;
      flex-shrink: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 30px !important;
      box-sizing: border-box !important;
    }

    .mahou-panel {
      background: rgba(255, 255, 255, 0.95) !important;
      border: 2px solid #1a1820 !important;
      padding: 20px !important;
      box-shadow: 6px 6px 0px #ff2e63 !important;
      border-radius: 4px !important;
      box-sizing: border-box !important;
      width: 100% !important;
    }

    .mahou-panel > b {
      display: block !important;
      font-size: 15px !important;
      margin-bottom: 15px !important;
      border-bottom: 1px dashed #1a1820 !important;
      padding-bottom: 8px !important;
      color: #1a1820 !important;
    }

    .mahou-panel > b i {
      margin-left: 8px !important;
    }

    /* Profile Adjustments */
    .mahou-profile-box {
      text-align: center !important;
    }

    .mahou-avatar-wrapper {
      width: 140px !important;
      height: 140px !important;
      margin: 0 auto 15px auto !important;
      border: 2px solid #1a1820 !important;
      overflow: hidden !important;
      box-shadow: 4px 4px 0px #00dffc !important;
    }

    .mahou-avatar-wrapper img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .mahou-info h3 {
      font-size: 18px !important;
      margin: 5px 0 !important;
      color: #1a1820 !important;
      font-family: 'Inter', sans-serif !important;
    }

    .mahou-info .role {
      font-size: 12px !important;
      color: #666 !important;
    }

    /* Post Card Display */
    .custom-post-card {
      background: rgba(255, 255, 255, 0.95) !important;
      border: 2px solid #1a1820 !important;
      padding: 30px !important;
      margin-bottom: 30px !important;
      border-radius: 4px !important;
      box-shadow: 6px 6px 0px #ff2e63 !important;
      transition: all 0.3s ease;
    }
    
    .custom-post-card:hover {
      box-shadow: 8px 8px 0px #00dffc !important;
      transform: translateY(-2px);
    }

    .custom-post-card h2 {
      font-size: 22px !important;
      margin-top: 0 !important;
      margin-bottom: 12px !important;
    }

    .custom-post-card h2 a {
      color: #1a1820 !important;
      text-decoration: none !important;
    }

    .custom-post-meta {
      font-size: 12px !important;
      color: #666 !important;
      margin-bottom: 15px !important;
    }

    .custom-post-link {
      display: inline-block !important;
      margin-top: 15px !important;
      font-size: 13px !important;
      color: #ff2e63 !important;
      text-decoration: none !important;
      font-weight: bold !important;
    }

    .mahou-about-img {
      width: 100% !important;
      height: auto !important;
      border: 2px solid #1a1820 !important;
      margin-bottom: 10px !important;
    }

    /* Mobile Setup */
    @media (max-width: 900px) {
      .mahou-main-grid {
        flex-direction: column-reverse !important;
      }
      .mahou-sidebar {
        width: 100% !important;
      }
    }
  </style>
</head>
<body>

<div id="back-to-top" title="Reload Position"><i class="fas fa-crosshairs"></i></div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <a href="#" class="logo">MAHOU ARCHIVE: ارشیو مدیا </a>
    <div><i class="fas fa-bullseye"></i></div>
  </div>

  <!-- MAIN ENGINE GRID -->
  <div class="mahou-main-grid">

    <!-- ISOLATED SIDEBAR COLUMN -->
    <div class="mahou-sidebar">
      
      <!-- Panel 1: Profile -->
      <div class="mahou-panel">
        <b><i class="fas fa-user-circle"></i>About Me!</b>
        <div class="mahou-profile-box">
          <div class="mahou-avatar-wrapper">
            <img src="https://uploadkon.ir/uploads/06a730_26InShot-20260530-094627246.gif" alt="Operator Edgar">
          </div>
          <div class="mahou-info">
            <h3>ALLSSEY (He/Him)</h3>
            <span class="role">Sleepy</span>
          </div>
          <div style="margin-top: 12px; color: #ff2e63; font-weight: bold; font-family:'Inter'; font-size:11px;">
            STATUS: aint nothing but a heartache
          </div>
        </div>
      </div>

      <!-- Panel 2: Playlist Engine -->
      <div class="mahou-panel">
        <b><i class="fas fa-music"></i> 🎧 Playlists </b>
        <div id="playlist-container"></div>
        <audio id="player" controls preload="none" style="width: 100%; margin-top: 10px; display: none;"></audio>
      </div>

      <!-- Panel 3: About Visuals -->
      <div class="mahou-panel">
        <b><i class="fas fa-shield-alt"></i> About </b>
        <img class="mahou-about-img" src="https://uploadkon.ir/uploads/c9b229_26cff7ba6be9f4ab104271ca89e4451844.jpg" alt="Surveillance Layer Image">
        <div style="font-size:0.82rem; color:#5a5666; line-height: 1.5;">
          WIP <span style="display: block; margin-top: 6px; color: #ff2e63; font-family:'Inter'; font-weight: bold;">TIMESTAMP: 9th Kho/405 🎯</span>
          <img src="https://uploadkon.ir/uploads/45d730_26IMG-7133.gif" style="display: block; margin-top: 12px; width:100%; border: 2px solid #1a1820;">
        </div>
      </div>

    </div> <!-- End Sidebar -->

    <!-- POSTS COLUMN -->
    <div id="blogfa-mirror-posts">
      <div class="custom-post-card">
        <p style="text-align: center; color: #5a5666; font-family: 'Vazirmatn', sans-serif;">در حال بارگذاری نوشته‌های وبلاگ...</p>
      </div>
    </div>

  </div> <!-- End Main Grid -->
</div> <!-- End Container -->

<!-- AUDIO PLAYER SCRIPTS -->
<script>
const playlists = [
  {
    folderName: "Madoka Magica OST",
    songs: [
      {
        name: "sis puella magica!",
        url: "https://uploadkon.ir/uploads/1fd629_2614-Sis-Puella-Magica-Yuki-Kajiura-320-.mp3",
        cover: "https://uploadkon.ir/uploads/fa3e29_26IMG-20260529-231618.jpg"
      },
      {
        name: "Dectrum",
        url: "https://uploadkon.ir/uploads/312d29_2612-Decretum-Sayaka-Miki-s-Them-Madoka-Magica【まどکま★マギカ】-PianoBox.mp3",
        cover: "https://uploadkon.ir/uploads/b4f529_26IMG-20260529-231602.jpg"
      },
      {
        name: "Magia Quattro",
        url: "https://uploadkon.ir/uploads/b38330_26Kalafina-Magia-quattro-128.mp3",
        cover: "https://uploadkon.ir/uploads/ea1130_26artworks-000034010291-41yfh5-t500x500.jpg"
      }
    ]
  }, 
  {
    folderName: "All Ado",
    songs: [
      {
        name: "Kura Kura",
        url: "https://uploadkon.ir/uploads/fb4630_26Ado-クラクラ-128.mp3",
        cover: "https://uploadkon.ir/uploads/203530_26IMG-20260530-165511.jpg"
       },
      { 
        name: "Ashite Ashite",
        url: "https://uploadkon.ir/uploads/eb8c24_26Ado-Aishite-Aishite-Aishite-000035.mp3",
        cover: "https://uploadkon.ir/uploads/6b9724_261ca44dc5eac6d36f42e0e05fd4fa1b63.jpg"
       },
      { 
        name:  "Readymade",
        url: "https://uploadkon.ir/uploads/926d24_26Ado-Readymade-000012.mp3",
        cover: "https://uploadkon.ir/uploads/ff9f24_2628a32cbc5884bbb69739f1f073c541bb-1000x1000x1.png"
       }
    ]
  }
];

let currentFolderIdx = null;
let currentSongIdx = null;

const playlistContainer = document.getElementById('playlist-container');
if (playlistContainer && playlists && playlists.length > 0) {
  playlists.forEach((folder, fIdx) => {
    const fDiv = document.createElement('div');
    fDiv.className = 'playlist-folder';
    fDiv.innerHTML = `
      <div class="folder-header" onclick="toggleFolder(${fIdx})" style="cursor:pointer; padding:8px 0; display:flex; justify-content:space-between;">
        <div class="folder-title"><i class="fas fa-folder" style="color:#ff2e63;"></i> <span style="font-size:13px; font-weight:bold; margin-right:5px;">${folder.folderName}</span></div>
        <div class="folder-chevron"><i class="fas fa-chevron-down" style="font-size:10px;"></i></div>
      </div>
      <div class="folder-songs" id="folder-${fIdx}" style="display:none; padding-right:15px; margin-top:5px;"><div class="folder-songs-inner"></div></div>
    `;
    const inner = fDiv.querySelector('.folder-songs-inner');
    folder.songs.forEach((song, sIdx) => {
      const sDiv = document.createElement('div');
      sDiv.className = 'song';
      sDiv.style = "cursor:pointer; padding:6px 0; display:flex; align-items:center; gap:8px; font-size:12px;";
      sDiv.onclick = (e) => { e.stopPropagation(); playTrack(fIdx, sIdx); };
      sDiv.innerHTML = `
        <img src="${song.cover}" style="width:24px; height:24px; border-radius:2px; object-fit:cover;">
        <span>${song.name}</span>
      `;
      inner.appendChild(sDiv);
    });
    playlistContainer.appendChild(fDiv);
  });
}

function toggleFolder(idx) {
  const target = document.getElementById(`folder-${idx}`);
  if(target) {
    const isHidden = target.style.display === 'none';
    target.style.display = isHidden ? 'block' : 'none';
  }
}

function playTrack(fIdx, sIdx) {
  const player = document.getElementById('player');
  if (!player) return;
  currentFolderIdx = fIdx; currentSongIdx = sIdx;
  player.src = playlists[fIdx].songs[sIdx].url;
  player.style.display = 'block';
  player.play().catch(err => console.log("Audio blocked:", err));
}
</script>

<!-- AUTOMATIC LIVE RSS FETCH ENGINE -->
<script>
  const rssFeedUrl = "https://mahouarchive.blogfa.com/rss"; 
  const apiEndpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssFeedUrl)}`;

  async function loadMirrorPosts() {
    try {
      const response = await fetch(apiEndpoint);
      const data = await response.json();

      if (data.status === 'ok') {
        const container = document.getElementById('blogfa-mirror-posts');
        container.innerHTML = ''; 

        data.items.forEach(post => {
          const postElement = document.createElement('div');
          postElement.className = 'custom-post-card'; 

          postElement.innerHTML = `
            <h2><a href="${post.link}" target="_blank">★ ${post.title}</a></h2>
            <div class="custom-post-meta">
              <span><i class="fas fa-calendar-alt"></i> ${new Date(post.pubDate).toLocaleDateString('fa-IR')}</span>
            </div>
            <div style="margin-top:10px; color:#222; line-height: 1.7; font-size:14px;">${post.description}</div>
            <div>
              <a class="custom-post-link" href="${post.link}" target="_blank">
                <i class="far fa-comment-dots"></i> مشاهده نظرات و ادامه مطلب
              </a>
            </div>
          `;
          container.appendChild(postElement);
        });
      } else {
        document.getElementById('blogfa-mirror-posts').innerHTML = '<div class="custom-post-card"><p>خطا در دریافت اطلاعات.</p></div>';
      }
    } catch (error) {
      console.error(error);
      document.getElementById('blogfa-mirror-posts').innerHTML = '<div class="custom-post-card"><p>مشکلی در اتصال به منبع رخ داد.</p></div>';
    }
  }

  window.addEventListener('DOMContentLoaded', loadMirrorPosts);
</script>
</body>
</html>

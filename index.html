       },
      { 
        name:  "Readymade",
        url: "https://uploadkon.ir/uploads/926d24_26Ado-Readymade-000012.mp3",
        cover: "https://uploadkon.ir/uploads/ff9f24_2628a32cbc5884bbb69739f1f073c541bb-1000x1000x1.png"
       },
      {
        name: "God-ish",
        url: "https://uploadkon.ir/uploads/d4d624_26Ado-God-ish-000046.mp3",
        cover: "https://uploadkon.ir/uploads/25ab24_26634ac404c5a9b92c40416a83906fa4f9-1000x1000x1.png"
       },
      {

        url: "https://uploadkon.ir/uploads/212930_26Ado-ショコラカタブラ-128.mp3",

      {
        name: "MIRROR",

      },
      {
        name: "RuLe",
        url: "https://uploadkon.ir/uploads/ecf730_26Ado-Rule-128.mp3",

  {
    folderName: "Fav late nighters",
    songs: [
      {
        name: "Salt-Wound routine",
        url: "https://uploadkon.ir/uploads/dc8024_26saltwound-routine-11vein.mp3",
        cover: "https://uploadkon.ir/uploads/519024_261782114380677.jpg"
      }
    ]
  }
];

let currentFolderIdx = null;
let currentSongIdx = null;

// Playlist Renderer
const playlistContainer = document.getElementById('playlist-container');
if (playlistContainer && playlists && playlists.length > 0) {
  playlists.forEach((folder, fIdx) => {
    const fDiv = document.createElement('div');
    fDiv.className = 'playlist-folder';
    fDiv.innerHTML = `
      <div class="folder-header" onclick="toggleFolder(${fIdx})">
        <div class="folder-title"><i class="fas fa-folder"></i> <span>${folder.folderName}</span></div>
        <div class="folder-chevron"><i class="fas fa-chevron-down"></i></div>
      </div>
      <div class="folder-songs" id="folder-${fIdx}"><div class="folder-songs-inner"></div></div>
    `;
    
    const inner = fDiv.querySelector('.folder-songs-inner');
    folder.songs.forEach((song, sIdx) => {
      const sDiv = document.createElement('div');
      sDiv.className = 'song';
      sDiv.id = `song-${fIdx}-${sIdx}`;
      sDiv.onclick = (e) => { e.stopPropagation(); playTrack(fIdx, sIdx); };
      sDiv.innerHTML = `
        <img src="${song.cover || 'https://uploadkon.ir/uploads/06a730_26InShot-20260530-094627246.gif'}">
        <span>${song.name}</span>
        <div class="wave"><span></span><span></span><span></span></div>
      `;
      inner.appendChild(sDiv);
    });
    playlistContainer.appendChild(fDiv);
  });
}

function toggleFolder(idx) {
  const folders = document.querySelectorAll('.playlist-folder');
  folders.forEach((f, i) => i === idx ? f.classList.toggle('is-open') : f.classList.remove('is-open'));
}

function playTrack(fIdx, sIdx) {
  const player = document.getElementById('player');
  if (!player) return;
  document.querySelectorAll('.song').forEach(s => s.classList.remove('is-playing'));
  currentFolderIdx = fIdx; currentSongIdx = sIdx;
  const songEl = document.getElementById(`song-${fIdx}-${sIdx}`);
  if(songEl) songEl.classList.add('is-playing');
  player.src = playlists[fIdx].songs[sIdx].url;
  player.style.display = 'block';
  player.play().catch(err => console.log("Audio presentation blocked:", err));
}

document.addEventListener("DOMContentLoaded", () => {
  const player = document.getElementById('player');
  if (player) {
    player.addEventListener('ended', () => {
      if (currentFolderIdx !== null && currentSongIdx !== null) {
        let next = currentSongIdx + 1;
        if (next >= playlists[currentFolderIdx].songs.length) next = 0;
        playTrack(currentFolderIdx, next);
      }
    });
  }
});
</script>

<!-- LIVE BLOGFA STREAMING SCRIPT -->
<script>
  const rssFeedUrl = "https://mahouarchive.blogfa.com/rss"; 
  const apiEndpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssFeedUrl)}`;

  async function loadMirrorPosts() {
    try {
      const response = await fetch(apiEndpoint);
      const data = await response.json();

      if (data.status === 'ok') {
        const container = document.getElementById('blogfa-mirror-posts');
        container.innerHTML = ''; 

        data.items.forEach(post => {
          const postElement = document.createElement('div');
          postElement.className = 'post'; 

          postElement.innerHTML = `
            <h2><a href="${post.link}" target="_blank">✮ ${post.title}</a></h2>
            <div class="post-meta">
              <span><i class="fas fa-dot-circle"></i> ${new Date(post.pubDate).toLocaleDateString('fa-IR')}</span>
            </div>
            <p>${post.description}</p>
            <div class="post-action-row">
              <a class="comment-redirect-link" href="${post.link}" target="_blank">
                <i class="far fa-comment-dots"></i> مشاهده نظرات در وبلاگ اصلی
              </a>
            </div>
          `;
          container.appendChild(postElement);
        });
      } else {
        document.getElementById('blogfa-mirror-posts').innerHTML = '<p style="text-align:center; padding:20px;">خطا در بارگذاری اطلاعات وبلاگ.</p>';
      }
    } catch (error) {
      console.error('Error fetching RSS:', error);
      document.getElementById('blogfa-mirror-posts').innerHTML = '<p style="text-align:center; padding:20px;">مشکلی در اتصال به آرشیو پیش آمد.</p>';
    }
  }

  window.addEventListener('DOMContentLoaded', loadMirrorPosts);
</script>

name: Sync Blogfa Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    name: Update this repo's README with latest stories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # CHANGED: Bumped from v4 to v4.2.2 (or latest) which updates internal Node configurations
        uses: actions/checkout@v4.2.2
        
      - name: Pull blog posts
        # CHANGED: Bumped from v1 to v1.6.8 (or your feed tool's latest release)
        uses: gautamkrishnar/blog-post-workflow@v1.6.8
        with:
          feed_list: "http://yourusername.blogfa.com/rss"
          max_post_count: 10

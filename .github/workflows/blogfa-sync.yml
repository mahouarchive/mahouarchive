name: Sync Blogfa Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    name: Update this repo's README with latest stories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        
      - name: Pull blog posts
        # CHANGED: Using the official @v1 rolling tag or @v1.9.6 to get Node 24 support
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "http://mahouarchive.blogfa.com/rss"
          max_post_count: 5
